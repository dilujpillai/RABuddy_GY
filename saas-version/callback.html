<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHS Smart - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full mx-4 text-center">
        <div class="mb-6">
            <div class="bg-gradient-to-br from-green-500 to-emerald-600 text-white rounded-xl w-16 h-16 flex items-center justify-center font-bold text-2xl shadow-lg mx-auto mb-4">
                🛡️
            </div>
            <h1 class="text-2xl font-bold text-slate-800">EHS<span class="text-green-600">Smart</span></h1>
        </div>
        
        <div id="loading" class="py-8">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mx-auto mb-4"></div>
            <p class="text-slate-600">Completing authentication...</p>
        </div>
        
        <div id="success" class="py-8 hidden">
            <div class="bg-green-100 text-green-600 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Authentication Successful!</h2>
            <p class="text-slate-600 mb-4">Redirecting you to the app...</p>
        </div>
        
        <div id="error" class="py-8 hidden">
            <div class="bg-red-100 text-red-600 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Authentication Failed</h2>
            <p id="errorMessage" class="text-red-600 mb-4">An error occurred during authentication.</p>
            <button onclick="window.location.href='index.html'" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition">
                Back to Home
            </button>
        </div>
    </div>

    <script>
    // ========================================
    // OAUTH CALLBACK HANDLER
    // ========================================
    
    const CONFIG = {
        // Replace with your actual credentials
        AZURE_CLIENT_ID: 'YOUR_CLIENT_ID_HERE',
        AZURE_TENANT_ID: 'common',
        REDIRECT_URI: window.location.origin + '/callback.html',
        // Backend API endpoint for token exchange
        TOKEN_EXCHANGE_ENDPOINT: 'https://risk-assessment-api-nine.vercel.app/api/auth/token'
    };

    async function handleCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        // Check for errors from OAuth provider
        if (error) {
            showError(errorDescription || error);
            return;
        }

        // Check if we have an authorization code
        if (!code) {
            showError('No authorization code received. Please try logging in again.');
            return;
        }

        try {
            // Exchange authorization code for tokens via backend
            const tokens = await exchangeCodeForTokens(code);
            
            // Store tokens securely
            sessionStorage.setItem('ehssmart_access_token', tokens.access_token);
            if (tokens.refresh_token) {
                localStorage.setItem('ehssmart_refresh_token', tokens.refresh_token);
            }
            
            // Get user info
            const userInfo = await getUserInfo(tokens.access_token);
            sessionStorage.setItem('ehssmart_user', JSON.stringify(userInfo));
            
            // Show success and redirect
            showSuccess();
            
        } catch (err) {
            console.error('OAuth callback error:', err);
            showError(err.message || 'Failed to complete authentication');
        }
    }

    async function exchangeCodeForTokens(code) {
        // In production, this should call YOUR backend to exchange the code
        // Never expose client_secret in frontend code!
        
        const response = await fetch(CONFIG.TOKEN_EXCHANGE_ENDPOINT, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                code: code,
                redirect_uri: CONFIG.REDIRECT_URI,
                grant_type: 'authorization_code'
            })
        });

        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error_description || 'Token exchange failed');
        }

        return response.json();
    }

    async function getUserInfo(accessToken) {
        // Get user profile from Microsoft Graph API
        const response = await fetch('https://graph.microsoft.com/v1.0/me', {
            headers: {
                'Authorization': `Bearer ${accessToken}`
            }
        });

        if (!response.ok) {
            throw new Error('Failed to get user info');
        }

        const user = await response.json();
        return {
            id: user.id,
            email: user.mail || user.userPrincipalName,
            name: user.displayName,
            firstName: user.givenName,
            lastName: user.surname
        };
    }

    function showSuccess() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
        
        // Redirect to app after short delay
        setTimeout(() => {
            window.location.href = 'index.html?auth=success';
        }, 1500);
    }

    function showError(message) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('errorMessage').textContent = message;
    }

    // Run callback handler on page load
    document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
